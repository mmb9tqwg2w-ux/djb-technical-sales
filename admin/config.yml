backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

# The editor UI lives at yoursite.netlify.app/admin
# Rosie logs in with her Netlify Identity account

collections:

  - name: "blades"
    label: "Blades & Cutting"
    label_singular: "Blade / Cutting Item"
    folder: "_data/blades"
    create: true
    slug: "{{slug}}"
    identifier_field: "code"
    summary: "{{active | ternary('✓','✗')}} {{code}} — {{description}}"
    fields:
      - { label: "Active (visible on site)", name: "active", widget: "boolean", default: true, hint: "Uncheck to hide this item without deleting it" }
      - { label: "Item Code", name: "code", widget: "string", hint: "e.g. BLA 11-100" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Unit Price ($)", name: "price", widget: "number", value_type: "float", min: 0, step: 0.01 }
      - { label: "Show Quantity in Stock", name: "show_qty", widget: "boolean", default: false, hint: "Turn on to display a quantity field" }
      - { label: "Quantity in Stock", name: "qty", widget: "number", value_type: "int", min: 0, required: false, hint: "Only shown on site if 'Show Quantity' is enabled" }

  - name: "knives"
